name: "Chromium"
version: "1.0.0"
slug: "chromium"
panel_icon: "mdi:google-chrome"
description: Docker container for Chromium
url: "https://github.com/mincka/ha-addons/tree/main/chromium"
arch:
  - aarch64
  - amd64
init: false
panel_admin: false
# SYS_ADMIN lets Chromium create the PID/user namespaces its sandbox needs.
# Without it the base image falls back to launching with --no-sandbox (which
# also shows the "unsupported command-line flag" infobar).
privileged:
  - SYS_ADMIN
map:
  - share:rw
ingress: true
ingress_port: 5800
ports:
  5800/tcp: null
  5900/tcp: null
  9222/tcp: null
environment:
  # Chromium runs as the default unprivileged user (USER_ID 1000) so its
  # sandbox works; the profile remap happens at init via 89-ha-persist.sh.
  KEEP_APP_RUNNING: "1"
# Sound support (forward audio to your host), not tested
devices:
  - /dev/snd
# Map a working PulseAudio setup into the container
audio: true
image: "ghcr.io/mincka/chromium-{arch}"
# To pass options as environment variables (thanks to legacy mode), they must be either "int" or "str" ("str?" will be ignored).
legacy: true
options:
  VNC_PASSWORD: ""
  ENABLE_CJK_FONT: "0"
  CHROMIUM_APP_URL: ""
  LANG: "en_US.UTF-8"
  TZ: "Etc/UTC"
  INSTALL_PACKAGES: ""
  PACKAGES_MIRROR: ""
  CONTAINER_DEBUG: "0"
  DISPLAY_WIDTH: "1920"
  DISPLAY_HEIGHT: "1080"
  DARK_MODE: "0"
  SECURE_CONNECTION: "0"
  SECURE_CONNECTION_VNC_METHOD: "SSL"
  SECURE_CONNECTION_CERTS_CHECK_INTERVAL: "60"
  WEB_AUDIO: "1"
  WEB_AUTHENTICATION: "0"
  WEB_AUTHENTICATION_USERNAME: ""
  WEB_AUTHENTICATION_PASSWORD: ""
  CHROMIUM_CUSTOM_ARGS: ""
  CHROMIUM_REMOTE_DEBUGGING: "0"
  CHROMIUM_REMOTE_DEBUGGING_PORT: "9222"
  WEB_FILE_MANAGER: "0"
  WEB_FILE_MANAGER_ALLOWED_PATHS: "AUTO"
  WEB_FILE_MANAGER_DENIED_PATHS: ""
  WEB_NOTIFICATION: "0"
  WEB_TERMINAL: "0"
  WEB_TERMINAL_SHELL_PATH: "/bin/sh"
  WEB_AUTHENTICATION_TOKEN_VALIDITY_TIME: "24"
schema:
  VNC_PASSWORD: str
  ENABLE_CJK_FONT: str
  CHROMIUM_APP_URL: str
  LANG: str
  TZ: str
  INSTALL_PACKAGES: str
  PACKAGES_MIRROR: str
  CONTAINER_DEBUG: str
  DISPLAY_WIDTH: str
  DISPLAY_HEIGHT: str
  DARK_MODE: str
  SECURE_CONNECTION: str
  SECURE_CONNECTION_VNC_METHOD: str
  SECURE_CONNECTION_CERTS_CHECK_INTERVAL: str
  WEB_AUDIO: str
  WEB_AUTHENTICATION: str
  WEB_AUTHENTICATION_USERNAME: str
  WEB_AUTHENTICATION_PASSWORD: str
  CHROMIUM_CUSTOM_ARGS: str
  CHROMIUM_REMOTE_DEBUGGING: str
  CHROMIUM_REMOTE_DEBUGGING_PORT: str
  WEB_FILE_MANAGER: str
  WEB_FILE_MANAGER_ALLOWED_PATHS: str
  WEB_FILE_MANAGER_DENIED_PATHS: str
  WEB_NOTIFICATION: str
  WEB_TERMINAL: str
  WEB_TERMINAL_SHELL_PATH: str
  WEB_AUTHENTICATION_TOKEN_VALIDITY_TIME: str
