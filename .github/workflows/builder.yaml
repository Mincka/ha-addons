name: Builder

env:
  BUILD_ARGS: "--test"
  MONITORED_FILES: "build.yaml config.yaml Dockerfile rootfs"

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/config.yaml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize builds
    outputs:
      changed_addons: ${{ steps.changed_addons.outputs.addons }}
      changed: ${{ steps.changed_addons.outputs.changed }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed_files
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Force build all: list all files
            FILES=$(git ls-files | tr '\n' ' ')
          else
            FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | tr '\n' ' ')
          fi
          echo "all=$FILES" >> $GITHUB_OUTPUT
          echo "Changed files: $FILES"

      - name: Find add-on directories
        id: addons
        uses: home-assistant/actions/helpers/find-addons@master

      - name: Get changed add-ons
        id: changed_addons
        run: |
          declare -a changed_addons
          for addon in ${{ steps.addons.outputs.addons }}; do
            if [[ "${{ steps.changed_files.outputs.all }}" =~ $addon ]]; then
              for file in ${{ env.MONITORED_FILES }}; do
                  if [[ "${{ steps.changed_files.outputs.all }}" =~ $addon/$file ]]; then
                    if [[ ! "${changed_addons[@]}" =~ $addon ]]; then
                      changed_addons+=("\"${addon}\",");
                    fi
                  fi
              done
            fi
          done

          changed=$(echo ${changed_addons[@]} | rev | cut -c 2- | rev)

          if [[ -n ${changed} ]]; then
            echo "Changed add-ons: $changed";
            echo "changed=true" >> $GITHUB_OUTPUT;
            echo "addons=[$changed]" >> $GITHUB_OUTPUT;
          else
            echo "No add-on had any monitored files changed (${{ env.MONITORED_FILES }})";
          fi

  build:
    needs: init
    runs-on: ubuntu-latest
    if: needs.init.outputs.changed == 'true'
    name: Build ${{ matrix.arch }} ${{ matrix.addon }} add-on
    strategy:
      max-parallel: 1
      matrix:
        addon: ${{ fromJson(needs.init.outputs.changed_addons) }}
        arch: ["aarch64", "amd64"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ matrix.addon }}"

      - name: Check if add-on should be built
        id: check
        run: |
          if [[ "${{ steps.info.outputs.architectures }}" =~ ${{ matrix.arch }} ]]; then
             echo "build_arch=true" >> $GITHUB_OUTPUT;
             echo "image=$(echo ${{ steps.info.outputs.image }} | cut -d'/' -f3)" >> $GITHUB_OUTPUT;
             if [[ -z "${{ github.head_ref }}" ]] && [[ "${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                 echo "BUILD_ARGS=" >> $GITHUB_ENV;
             fi
           else
             echo "${{ matrix.arch }} is not a valid arch for ${{ matrix.addon }}, skipping build";
             echo "build_arch=false" >> $GITHUB_OUTPUT;
          fi

      - name: Login to GitHub Container Registry
        if: env.BUILD_ARGS != '--test'
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-pull builder image with retry
        if: steps.check.outputs.build_arch == 'true'
        run: |
          IMAGE="ghcr.io/home-assistant/amd64-builder:2026.02.1"
          for i in $(seq 1 50); do
            echo "Attempt $i to pull $IMAGE..."
            docker pull "$IMAGE" && break
            echo "Failed, waiting 5s..."
            sleep 5
          done
          docker image inspect "$IMAGE" > /dev/null 2>&1 || exit 1

      - name: Build ${{ matrix.addon }} add-on
        if: steps.check.outputs.build_arch == 'true'
        uses: home-assistant/builder@2026.02.1
        with:
          args: |
            ${{ env.BUILD_ARGS }} \
            --no-cosign-verify \
            --${{ matrix.arch }} \
            --target /data/${{ matrix.addon }} \
            --image "${{ steps.check.outputs.image }}" \
            --docker-hub "ghcr.io/${{ github.repository_owner }}" \
            --addon

  bump-version:
    needs: build
    if: needs.build.result == 'success' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Bump version in config.yaml from .next-version files
        run: |
          changed=false

          for addon_dir in firefox firefox_edge; do
            next_version_file="$addon_dir/.next-version"
            if [[ -f "$next_version_file" ]]; then
              NEW_VERSION=$(cat "$next_version_file" | tr -d '[:space:]')
              CURRENT_VERSION=$(grep -E '^version:' "$addon_dir/config.yaml" | sed 's/version:[[:space:]]*//' | tr -d '"' | tr -d "'")

              if [[ "$NEW_VERSION" != "$CURRENT_VERSION" ]]; then
                echo "Bumping $addon_dir from $CURRENT_VERSION to $NEW_VERSION"
                sed -i "s/^version:.*/version: \"$NEW_VERSION\"/" "$addon_dir/config.yaml"
                rm -f "$next_version_file"
                changed=true
              else
                echo "$addon_dir already at version $NEW_VERSION"
              fi
            fi
          done

          if [[ "$changed" == "true" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: bump version after successful build"
            git push
          else
            echo "No version bump needed"
          fi