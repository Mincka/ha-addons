name: Builder

env:
  MONITORED_FILES: "config.yaml Dockerfile rootfs"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize builds
    outputs:
      changed_addons: ${{ steps.changed_addons.outputs.addons }}
      changed: ${{ steps.changed_addons.outputs.changed }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed_files
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Force build all: list all files
            FILES=$(git ls-files | tr '\n' ' ')
          else
            FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | tr '\n' ' ')
          fi
          echo "all=$FILES" >> $GITHUB_OUTPUT
          echo "Changed files: $FILES"

      - name: Find add-on directories
        id: addons
        uses: home-assistant/actions/helpers/find-addons@master

      - name: Get changed add-ons
        id: changed_addons
        run: |
          declare -a changed_addons
          for addon in ${{ steps.addons.outputs.addons }}; do
            if [[ "${{ steps.changed_files.outputs.all }}" =~ $addon ]]; then
              for file in ${{ env.MONITORED_FILES }}; do
                  if [[ "${{ steps.changed_files.outputs.all }}" =~ $addon/$file ]]; then
                    if [[ ! "${changed_addons[@]}" =~ $addon ]]; then
                      changed_addons+=("\"${addon}\",");
                    fi
                  fi
              done
            fi
          done

          changed=$(echo ${changed_addons[@]} | rev | cut -c 2- | rev)

          if [[ -n ${changed} ]]; then
            echo "Changed add-ons: $changed";
            echo "changed=true" >> $GITHUB_OUTPUT;
            echo "addons=[$changed]" >> $GITHUB_OUTPUT;
          else
            echo "No add-on had any monitored files changed (${{ env.MONITORED_FILES }})";
          fi

  build:
    needs: init
    if: needs.init.outputs.changed == 'true'
    name: Build ${{ matrix.arch }} ${{ matrix.addon }} add-on
    # Build each architecture natively (no QEMU): amd64 on an x86 runner,
    # aarch64 on an ARM runner.
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.init.outputs.changed_addons) }}
        arch: ["aarch64", "amd64"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ matrix.addon }}"

      - name: Prepare build parameters
        id: prep
        run: |
          # Skip arches the add-on doesn't declare.
          if [[ ! "${{ steps.info.outputs.architectures }}" =~ ${{ matrix.arch }} ]]; then
            echo "${{ matrix.arch }} is not a valid arch for ${{ matrix.addon }}, skipping build"
            echo "build_arch=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "build_arch=true" >> "$GITHUB_OUTPUT"

          # Resolve the per-arch image name from config.yaml's {arch} template.
          IMAGE="${{ steps.info.outputs.image }}"
          IMAGE="${IMAGE/\{arch\}/${{ matrix.arch }}}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

          # The info helper preserves the surrounding quotes from
          # config.yaml's `version: "x.y.z"`; strip them so the tag is valid.
          VERSION="${{ steps.info.outputs.version }}"
          VERSION="${VERSION%\"}"
          VERSION="${VERSION#\"}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Push (and advertise) only on a real push to main or a manual run;
          # pull requests are test-only builds that never touch the registry.
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ${{ matrix.addon }} add-on
        if: steps.prep.outputs.build_arch == 'true'
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          image: ${{ steps.prep.outputs.image }}
          image-tags: |
            ${{ steps.prep.outputs.version }}
            latest
          version: ${{ steps.prep.outputs.version }}
          context: ./${{ matrix.addon }}
          file: ./${{ matrix.addon }}/Dockerfile
          push: ${{ steps.prep.outputs.push }}
          cosign: "false"
          cache-gha-scope: ${{ matrix.addon }}-${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}